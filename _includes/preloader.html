<div id="loader-wrapper" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; display: flex; justify-content: center; align-items: center;">
    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
        <span class="visually-hidden">جاري التحميل...</span>
    </div>
</div>

<script>
    // عندما ينتهي المتصفح من تحميل "كل شيء" (بما في ذلك الصور والمكتبات)
    window.addEventListener('load', function() {
        // ننتظر أولاً انتهاء تحميل الصفحة (الصور والملفات)
        MathJax.typesetPromise().then(() => {
            // الستارة لا تُرفع إلا بعد أن ينتهي MathJax من تحويل كل المعادلات
            const loader = document.getElementById('loader-wrapper');
        
            loader.style.transition = 'opacity 0.6s ease'; // تلاشي ناعم جداً
            loader.style.opacity = '0';

            setTimeout(() => {
                loader.style.display = 'none';
                document.body.style.visibility = 'visible';
                // هنا ستظهر الصفحة وهي "صخرة" لا تهتز، لأن المعادلات قُضِيَ أمرها خلف الستارة
            }, 600);
        }).catch((err) => {
            // في حال حدوث خطأ، ارفع الستارة على أي حال لكي لا يعلق المستخدم
            document.getElementById('loader-wrapper').style.display = 'none';
            document.body.style.visibility = 'visible';
        });
    });

</script>
