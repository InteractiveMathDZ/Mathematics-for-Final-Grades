<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تمرين تفاعلي: المتتاليات</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h2 { color: #2c3e50; }
        input { padding: 10px; width: 80%; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background-color: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #219150; }
        #feedback { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>تمرين سريع: المتتالية الحسابية</h2>
    <p>لتكن المتتالية الحسابية (U<sub>n</sub>) حيث حده الأول U<sub>0</sub> = 2 وأساسها r = 3.</p>
    <p><strong>احسب الحد U<sub>5</sub>؟</strong></p>
    
    <input type="number" id="userAnswer" placeholder="أدخل إجابتك هنا...">
    <br>
    <button onclick="checkAnswer()">تحقق من الإجابة</button>
    
    <div id="feedback"></div>
</div>

<script>
    function checkAnswer() {
        const answer = document.getElementById('userAnswer').value;
        const feedback = document.getElementById('feedback');
        
        // الحساب: U5 = U0 + 5*r = 2 + 5*3 = 17
        if (answer == 17) {
            feedback.style.color = "green";
            feedback.innerHTML = "أحسنت! إجابة صحيحة. المنطق سليم: U₅ = 2 + (5 × 3) = 17.";
        } else if (answer == "") {
            feedback.style.color = "orange";
            feedback.innerHTML = "رجاءً أدخل رقماً أولاً.";
        } else {
            feedback.style.color = "red";
            feedback.innerHTML = "إجابة خاطئة. تذكر القانون: Uₙ = U₀ + nr. حاول مجدداً!";
        }
    }
</script>

</body>
</html>
